<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timko - Entrenadores</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#080a09;--card:#0e1310;--soft:#141c17;--border:#1e2b22;--border2:#243028;
      --accent:#2ebd7f;--adim:rgba(46,189,127,.08);--text:#e8ede9;--muted:#6b7d72;--muted2:#4a5850;
      --danger:#f87171;--yellow:#fbbf24;--r:14px;--rs:9px;
      --cm:#38bdf8;--czm:#a78bfa;--cf:#fb923c;--ca:#4ade80;--cc:#f87171
    }
    body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* LOGIN */
    #loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
    .lbox{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px}
    .ltitle{font-size:20px;font-weight:900;margin-bottom:4px}
    .lsub{font-size:11px;color:var(--muted);margin-bottom:24px}
    .flabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:6px}
    .finput{width:100%;background:var(--soft);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'Montserrat',sans-serif;font-size:16px;font-weight:600;padding:13px 14px;outline:none;transition:border .2s;margin-bottom:16px}
    .finput:focus{border-color:var(--accent)}
    .btnp{width:100%;background:var(--accent);color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:15px;border:none;border-radius:var(--rs);cursor:pointer}
    .btnp:hover{opacity:.9}
    .lerr{display:none;margin-top:12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--danger);font-size:12px;font-weight:600;padding:10px 14px;border-radius:var(--rs)}

    /* APP */
    #appScreen{display:none;flex-direction:column;min-height:100vh}
    .topbar{position:sticky;top:0;z-index:50;background:rgba(8,10,9,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px}
    .ttitle{font-size:13px;font-weight:800} .tsub{font-size:9px;color:var(--muted)}
    .btsm{background:var(--soft);border:1px solid var(--border2);color:var(--muted);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:6px 12px;border-radius:100px;cursor:pointer}

    /* MAIN */
    .main{padding:16px;max-width:700px;margin:0 auto;width:100%}
    .sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
    .scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px}
    .slabel{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:4px}
    .sval{font-size:26px;font-weight:900} .sg{color:var(--accent)} .sy{color:var(--yellow)} .sr{color:var(--danger)}

    .swrap{position:relative;margin-bottom:12px}
    .sicon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px}
    .sinput{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Montserrat',sans-serif;font-size:13px;padding:11px 14px 11px 36px;outline:none}
    .sinput:focus{border-color:var(--accent)}
    .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:6px 12px;border-radius:100px;cursor:pointer;white-space:nowrap}
    .chip.on{background:var(--adim);border-color:var(--accent);color:var(--accent)}

    .sectit{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--muted2);margin-bottom:10px}
    .acard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
    .acard:hover{border-color:var(--border2)}
    .ahdr{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .anom{font-size:15px;font-weight:800}
    .achips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
    .achip{font-size:10px;font-weight:600;padding:3px 8px;border-radius:100px;background:var(--soft);border:1px solid var(--border);color:var(--muted)}
    .ebadge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0}
    .ev{background:rgba(46,189,127,.12);border:1px solid rgba(46,189,127,.25);color:var(--accent)}
    .ep{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.3);color:var(--yellow)}
    .ex{background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.25);color:var(--danger)}
    .es{background:var(--soft);border:1px solid var(--border);color:var(--muted2)}
    .afoot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--muted2)}

    .plabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--yellow);margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .pdot{width:7px;height:7px;border-radius:50%;background:var(--yellow)}
    .pbtns{display:flex;gap:8px;margin-top:10px}
    .btnver{flex:1;background:var(--soft);border:1px solid var(--border2);color:var(--muted);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:9px;border-radius:var(--rs);cursor:pointer}
    .btnapr{flex:1;background:rgba(46,189,127,.1);border:1px solid var(--accent);color:var(--accent);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:800;padding:9px;border-radius:var(--rs);cursor:pointer;transition:all .2s}
    .btnapr:hover{background:var(--accent);color:#fff} .btnapr:disabled{opacity:.5;cursor:not-allowed}
    .divider{height:1px;background:var(--border);margin:14px 0}

    .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .lwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;gap:12px}
    .ltxt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
    .empty{text-align:center;padding:32px 16px;color:var(--muted);font-size:12px;font-weight:600}

    /* MODAL */
    .overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.8);overflow-y:auto}
    .overlay.open{display:block}
    .msheet{width:100%;min-height:100vh;background:var(--card);padding:0 0 60px;max-width:700px;margin:0 auto}
    .mtopbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;position:sticky;top:0;background:var(--card);z-index:10;border-bottom:1px solid var(--border)}
    .mnom{font-size:18px;font-weight:900}
    .btnclose{width:34px;height:34px;border-radius:50%;border:1px solid var(--border2);background:var(--soft);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;flex-shrink:0}
    .mcontent{padding:16px}

    /* FICHA */
    .fsec{background:var(--soft);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .fstit{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted2);margin-bottom:12px}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .filabel{font-size:9px;color:var(--muted2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
    .fival{font-size:13px;font-weight:700}
    .obsta{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-family:'Montserrat',sans-serif;font-size:12px;padding:10px;resize:vertical;min-height:80px;outline:none}
    .obsta:focus{border-color:var(--accent)}
    .btnobs{width:100%;margin-top:8px;background:var(--adim);border:1px solid var(--accent);color:var(--accent);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:11px;border-radius:var(--rs);cursor:pointer}
    .btnobs:hover{background:var(--accent);color:#fff}
    .btnaprficha{width:100%;padding:14px;background:rgba(46,189,127,.1);border:1px solid var(--accent);color:var(--accent);font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;border-radius:var(--rs);cursor:pointer;transition:all .2s;margin-top:8px}
    .btnaprficha:hover{background:var(--accent);color:#fff} .btnaprficha:disabled{opacity:.5;cursor:not-allowed}
    .msgok{display:none;background:rgba(46,189,127,.1);border:1px solid rgba(46,189,127,.3);color:var(--accent);font-size:11px;font-weight:700;padding:10px;border-radius:var(--rs);text-align:center;margin-bottom:8px}

    /* RUTINA */
    .plansel{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
    .planbtn{padding:7px 16px;border-radius:100px;border:1px solid var(--border2);background:var(--soft);font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
    .planbtn.on{background:var(--adim);border-color:var(--accent);color:var(--accent)}
    .diacard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
    .diahdr{background:linear-gradient(90deg,rgba(26,69,51,.8),rgba(26,69,51,.2));padding:10px 14px;border-bottom:1px solid var(--border)}
    .diatit{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.12em}
    .blwrap{border-bottom:1px solid var(--border)} .blwrap:last-child{border-bottom:none}
    .blhbar{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-left:4px solid var(--accent)}
    .bm{border-left-color:var(--cm);background:rgba(56,189,248,.04)}
    .bz{border-left-color:var(--czm);background:rgba(167,139,250,.04)}
    .bf{border-left-color:var(--cf);background:rgba(251,146,60,.04)}
    .ba{border-left-color:var(--ca);background:rgba(74,222,128,.04)}
    .bc{border-left-color:var(--cc);background:rgba(248,113,113,.04)}
    .bci{border-left-color:var(--accent);background:rgba(46,189,127,.03)}
    .blnom{font-size:10px;font-weight:800;letter-spacing:.1em}
    .blbody{padding:8px 12px 10px;display:flex;flex-direction:column;gap:6px}

    /* EJERCICIO EDITABLE */
    .ejcard{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
    .ejtop{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;gap:8px}
    .ejnom{font-size:13px;font-weight:800;flex:1}
    .btndel{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);color:var(--danger);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;cursor:pointer}
    .ejdosis{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid var(--border)}
    .ditem{padding:6px 8px;border-right:1px solid var(--border)} .ditem:last-child{border-right:none}
    .dlbl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted2);margin-bottom:4px}
    .dinput{width:100%;background:var(--soft);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:5px 7px;outline:none}
    .dinput:focus{border-color:var(--accent)}

    .btnadd{width:100%;background:rgba(46,189,127,.06);border:1px dashed rgba(46,189,127,.3);color:var(--accent);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;padding:9px;border-radius:var(--rs);cursor:pointer;margin-top:4px}
    .addform{display:none;background:rgba(46,189,127,.04);border:1px solid rgba(46,189,127,.15);border-radius:var(--rs);padding:12px;margin-top:6px}
    .addform.open{display:block}
    .addinput{width:100%;background:var(--soft);border:1px solid var(--border2);border-radius:var(--rs);color:var(--text);font-family:'Montserrat',sans-serif;font-size:12px;padding:9px 11px;outline:none;margin-bottom:8px}
    .addinput:focus{border-color:var(--accent)}
    .addgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
    .addml{font-size:8px;font-weight:700;text-transform:uppercase;color:var(--muted2);margin-bottom:3px;display:block}
    .addmi{background:var(--soft);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-family:'Montserrat',sans-serif;font-size:11px;padding:7px 8px;outline:none;width:100%}
    .addbtns{display:flex;gap:6px}
    .ejresults{display:flex;flex-direction:column;gap:4px;margin-bottom:8px;max-height:180px;overflow-y:auto}
    .ejresult-item{padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:space-between}
    .ejresult-item:hover{border-color:var(--accent);background:var(--adim)}
    .ejresult-meta{font-size:9px;font-weight:600;color:var(--muted)}
    .btnconf{flex:1;background:var(--accent);border:none;color:#fff;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:800;padding:9px;border-radius:var(--rs);cursor:pointer}
    .btncancel{padding:9px 14px;background:var(--soft);border:1px solid var(--border2);color:var(--muted);font-family:'Montserrat',sans-serif;font-size:10px;font-weight:700;border-radius:var(--rs);cursor:pointer}

    .btnguardar{width:100%;padding:13px;background:linear-gradient(135deg,rgba(26,69,51,.9),#1a9960);border:none;color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border-radius:var(--rs);cursor:pointer;margin-bottom:10px}
    .btnguardar:hover{opacity:.9}

    .arow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
    .arow:last-child{border-bottom:none}
    .adot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
    .af{font-weight:700} .ap{color:var(--muted);font-size:10px}
    .crow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:11px}
    .crow:last-child{border-bottom:none}
    .cej{font-weight:700} .cm2{color:var(--muted);font-size:10px} .ckg{font-weight:900;color:var(--accent)}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div style="text-align:center;margin-bottom:20px">
    <img src="https://drive.google.com/thumbnail?id=14nBk1mAj7yOyhylLpxvDxzVqgwMUJUIW&sz=w120" style="width:68px;height:68px;border-radius:50%;border:2px solid var(--accent);margin-bottom:10px;display:block;margin-left:auto;margin-right:auto">
    <div style="font-size:8px;font-weight:800;letter-spacing:.3em;text-transform:uppercase;color:var(--accent)">Staff / Entrenadores</div>
  </div>
  <div class="lbox">
    <div class="ltitle">Panel de Entrenadores</div>
    <div class="lsub">Gimnasio Timko — Acceso interno</div>
    <div class="flabel">DNI del entrenador</div>
    <input class="finput" type="number" id="dniInput" placeholder="Ej: 30000000" inputmode="numeric">
    <button class="btnp" id="btnEntrar">Ingresar</button>
    <div class="lerr" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <div class="topbar">
    <div><div class="ttitle">Gimnasio Timko</div><div class="tsub">Panel de Entrenadores</div></div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="staffNombre" style="font-size:10px;font-weight:700;color:var(--muted)">Staff</span>
      <button class="btsm" id="btnSalir">Salir</button>
    </div>
  </div>
  <div class="main">
    <div class="sgrid">
      <div class="scard"><div class="slabel">Total</div><div class="sval sg" id="stTotal">-</div></div>
      <div class="scard"><div class="slabel">Vigentes</div><div class="sval sg" id="stVig">-</div></div>
      <div class="scard"><div class="slabel">Pendientes</div><div class="sval sy" id="stPend">-</div></div>
      <div class="scard"><div class="slabel">Vencidos</div><div class="sval sr" id="stVenc">-</div></div>
    </div>
    <div class="swrap">
      <span class="sicon">🔍</span>
      <input class="sinput" type="text" id="searchInput" placeholder="Buscar alumno...">
    </div>
    <div class="chips" id="filtrosWrap">
      <button class="chip on" data-f="todos">Todos</button>
      <button class="chip" data-f="Plan vigente">Vigentes</button>
      <button class="chip" data-f="Plan vence pronto">Vence pronto</button>
      <button class="chip" data-f="Plan vencido">Vencidos</button>
      <button class="chip" data-f="Sin plan">Sin plan</button>
      <button class="chip" data-f="Pendiente aprobación">Pendientes</button>
    </div>
    <div class="sectit">Alumnos</div>
    <div id="listaAlumnos"><div class="lwrap"><div class="spin"></div><div class="ltxt">Cargando...</div></div></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="msheet">
    <div class="mtopbar">
      <div class="mnom" id="mNom">-</div>
      <button class="btnclose" id="btnClose">✕</button>
    </div>
    <div class="mcontent" id="mContent"><div class="lwrap"><div class="spin"></div></div></div>
  </div>
</div>

<script>

// ── API HELPER ──
var API_URL = 'https://script.google.com/macros/s/AKfycbz-bA9yFTIHoqcQ-o1V2McqPVig3kLI9RmZW662aJbxYeZnvNLjB_AUdozb0qdKQmhy9Q/exec';
function api(accion, params, onSuccess, onError) {
  var url = API_URL + '?accion=' + encodeURIComponent(accion);
  if (params) Object.keys(params).forEach(function(k) {
    var v = params[k];
    url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(typeof v==='object'?JSON.stringify(v):String(v));
  });
  fetch(url).then(function(r){return r.json();}).then(function(d){
    if(d.error) onError({message:d.error}); else onSuccess(d);
  }).catch(function(e){onError({message:e.message||'Error'});});
}
function apiPost(accion, params, onSuccess, onError) {
  params = params||{};
  params.accion = accion;
  fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(params)})
    .then(function(r){return r.json();}).then(function(d){
      if(d.error) onError({message:d.error}); else onSuccess(d);
    }).catch(function(e){onError({message:e.message||'Error'});});
}
var _alumnos=[], _filtro='todos', _busqueda='';
var _rutina=[], _planes=[], _videos={}, _planActivo='', _archActual='', _dniActual='';

// ── LOGIN ──
document.getElementById('btnEntrar').addEventListener('click', entrar);
document.getElementById('dniInput').addEventListener('keydown',function(e){if(e.key==='Enter')entrar();});
function entrar(){
  var dni=document.getElementById('dniInput').value.trim();
  if(!dni){showErr('Ingresá tu DNI.');return;}
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='flex';
  cargarAlumnos();
}
document.getElementById('btnSalir').addEventListener('click',function(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
  document.getElementById('dniInput').value='';
});
function showErr(m){var e=document.getElementById('loginError');e.textContent=m;e.style.display='block';}

// ── CARGAR ──
function cargarAlumnos(){
  api('listarAlumnos', {}, function(r){_alumnos=r.alumnos||[];actualizarStats();renderLista();},
    function(e){document.getElementById('listaAlumnos').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';});
}
function actualizarStats(){
  document.getElementById('stTotal').textContent=_alumnos.length;
  document.getElementById('stVig').textContent=_alumnos.filter(function(a){return a.estado==='Plan vigente';}).length;
  document.getElementById('stPend').textContent=_alumnos.filter(function(a){return a.estado==='Pendiente aprobación';}).length;
  document.getElementById('stVenc').textContent=_alumnos.filter(function(a){return a.estado==='Plan vencido';}).length;
}

// ── FILTROS ──
document.getElementById('filtrosWrap').addEventListener('click',function(e){
  var b=e.target.closest('.chip');if(!b)return;
  document.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
  b.classList.add('on');_filtro=b.getAttribute('data-f');renderLista();
});
document.getElementById('searchInput').addEventListener('input',function(){_busqueda=this.value.toLowerCase();renderLista();});

// ── RENDER LISTA ──
function renderLista(){
  var pend=_alumnos.filter(function(a){return a.estado==='Pendiente aprobación';});
  var lista=_alumnos.filter(function(a){
    if(a.estado==='Pendiente aprobación')return false;
    var mf=_filtro==='todos'||a.estado===_filtro;
    var mb=!_busqueda||a.nombre.toLowerCase().indexOf(_busqueda)>=0;
    return mf&&mb;
  });
  var html='';
  if(pend.length&&(_filtro==='todos'||_filtro==='Pendiente aprobación')){
    html+='<div class="plabel"><span class="pdot"></span>Solicitudes pendientes ('+pend.length+')</div>';
    pend.forEach(function(a){
      html+='<div class="acard" style="border-color:rgba(251,191,36,.3)">'
        +'<div class="ahdr"><div class="anom">'+esc(a.nombre)+'</div><div class="ebadge ep">Pendiente</div></div>'
        +'<div class="achips">'+ch(a.objetivo)+ch(a.nivel)+ch(a.dias?a.dias+' días/sem':'')+ch(a.molestias)+'</div>'
        +'<div class="pbtns">'
        +'<button class="btnver" onclick="abrirFicha(\''+esc(a.archivoId)+'\',\''+esc(a.nombre)+'\',\''+esc(a.dni)+'\',\'Pendiente aprobación\')">Ver y editar rutina</button>'
        +'<button class="btnapr" onclick="aprobarLista(\''+esc(a.dni)+'\',\''+esc(a.nombre)+'\',this)">✓ Aprobar</button>'
        +'</div></div>';
    });
    html+='<div class="divider"></div>';
  }
  if(_filtro!=='Pendiente aprobación'){
    html+=lista.map(function(a){
      var cls=eCls(a.estado);
      return '<div class="acard" onclick="abrirFicha(\''+esc(a.archivoId)+'\',\''+esc(a.nombre)+'\',\''+esc(a.dni)+'\',\''+esc(a.estado)+'\')">'
        +'<div class="ahdr"><div class="anom">'+esc(a.nombre)+'</div><div class="ebadge '+cls+'">'+esc(a.estado||'Sin plan')+'</div></div>'
        +'<div class="achips">'+ch(a.objetivo)+ch(a.nivel)+ch(a.planActual)+ch(a.vencimiento?'Vence: '+a.vencimiento:'')+'</div>'
        +'<div class="afoot"><span>'+esc(a.sesionesmes||'0')+' sesiones este mes</span><span>'+esc(a.ultimaSesion||'Sin entrenamientos')+'</span></div>'
        +'</div>';
    }).join('');
  }
  if(!html)html='<div class="empty">No hay alumnos.</div>';
  document.getElementById('listaAlumnos').innerHTML=html;
}
function eCls(e){if(e==='Plan vigente')return'ev';if(e==='Plan vence pronto')return'ep';if(e==='Plan vencido')return'ex';return'es';}
function ch(t){if(!t||t==='-')return'';return'<span class="achip">'+esc(String(t))+'</span>';}

// ── APROBAR DESDE LISTA ──
function aprobarLista(dni,nombre,btn){
  if(!confirm('¿Aprobar la rutina de '+nombre+'?\nEl alumno podrá ver su rutina inmediatamente.'))return;
  btn.disabled=true;btn.textContent='Aprobando...';
  api('aprobar', {dni: dni}, function(){
    var a=_alumnos.find(function(x){return ndni(x.dni)===ndni(dni);});
    if(a)a.estado='Plan vigente';
    actualizarStats();renderLista();
  }, function(e){btn.disabled=false;btn.textContent='✓ Aprobar';alert('Error: '+e.message);});
}

// ── MODAL ──
function abrirFicha(archId,nombre,dni,estado){
  _archActual=archId;_dniActual=dni;
  document.getElementById('mNom').textContent=nombre;
  document.getElementById('mContent').innerHTML='<div class="lwrap"><div class="spin"></div><div class="ltxt">Cargando ficha...</div></div>';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').scrollTop=0;
  api('fichaConRutina', {archivoId: archId}, function(r){renderFicha(r,archId,dni,estado);},
    function(e){document.getElementById('mContent').innerHTML='<div class="empty">Error: '+esc(e.message)+'</div>';});
}
document.getElementById('btnClose').addEventListener('click',function(){document.getElementById('overlay').classList.remove('open');});
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});

// ── RENDER FICHA ──
function renderFicha(r,archId,dni,estado){
  var a=r.alumno,cargas=r.cargas||[],asist=r.asistencia||[];
  _rutina=r.rutina||[];_planes=r.planes||[];_videos=r.videos||{};_planActivo=r.planActivo||'';
  var html='';

  // Botón aprobar si pendiente
  if(estado==='Pendiente aprobación'){
    html+='<div class="fsec" style="border-color:rgba(46,189,127,.3)">'
      +'<div class="fstit" style="color:var(--accent)">Solicitud pendiente</div>'
      +'<p style="font-size:12px;color:var(--muted);margin-bottom:10px">Revisá la rutina, editá lo que necesites y aprobá cuando estés conforme.</p>'
      +'<div class="msgok" id="msgGuardado">✓ Cambios guardados en la rutina</div>'
      +'<button class="btnaprficha" id="btnAprFicha" onclick="aprobarModal(\''+esc(dni)+'\',\''+esc(a.nombre)+'\',this)">✓ Aprobar solicitud</button>'
      +'</div>';
  }

  // Datos
  html+='<div class="fsec"><div class="fstit">Datos del alumno</div><div class="fgrid">';
  html+=fi('Objetivo',a.objetivo)+fi('Nivel',a.nivel)+fi('Días/sem',a.dias)+fi('Tiempo',a.tiempo);
  html+=fi('Molestias',a.molestias)+fi('Impacto',a.impacto)+fi('Plan',a.planActual)+fi('Vencimiento',a.vencimiento);
  html+='</div></div>';

  // Rutina editable
  if(_rutina.length){
    html+='<div class="fsec"><div class="fstit">Rutina generada — podés editar antes de aprobar</div>';
    if(_planes.length>1){
      html+='<div class="plansel" id="planSel">';
      _planes.forEach(function(p){html+='<button class="planbtn'+(p===_planActivo?' on':'')+'" onclick="cambiarPlan(\''+esc(p)+'\',this)">'+esc(p)+'</button>';});
      html+='</div>';
    }
    html+='<div id="rutinaContainer">'+renderRutina(_rutina)+'</div>';
    if(estado==='Pendiente aprobación'){
      html+='<button class="btnguardar" onclick="guardarCambios()">💾 Guardar cambios en la rutina</button>';
    }
    html+='</div>';
  }

  // Observaciones
  html+='<div class="fsec"><div class="fstit">Observaciones del entrenador</div>'
    +'<textarea class="obsta" id="obsTa">'+esc(a.obsProfe||'')+'</textarea>'
    +'<button class="btnobs" onclick="guardarObs(\''+esc(archId)+'\')">Guardar observaciones</button>'
    +'<div id="obsMsg" style="display:none;font-size:11px;color:var(--accent);margin-top:6px;font-weight:700;text-align:center">Guardado ✓</div>'
    +'</div>';

  // Asistencia
  html+='<div class="fsec"><div class="fstit">Asistencia reciente ('+asist.length+')</div>';
  if(!asist.length)html+='<div style="font-size:12px;color:var(--muted)">Sin registros.</div>';
  else asist.slice(0,8).forEach(function(r){html+='<div class="arow"><div class="adot"></div><div class="af">'+esc(r.fecha)+'</div><div class="ap">'+esc(r.plan+' · '+r.dia)+'</div></div>';});
  html+='</div>';

  // Cargas
  html+='<div class="fsec"><div class="fstit">Cargas recientes ('+cargas.length+')</div>';
  if(!cargas.length)html+='<div style="font-size:12px;color:var(--muted)">Sin registros.</div>';
  else cargas.slice(0,8).forEach(function(c){html+='<div class="crow"><div><div class="cej">'+esc(c.ejercicio)+'</div><div class="cm2">'+esc(c.fecha+' · '+c.semana)+'</div></div><div class="ckg">'+esc(c.kg)+'</div></div>';});
  html+='</div>';

  // Link sheets
  if(a.archivoId)html+='<div class="fsec"><a href="https://docs.google.com/spreadsheets/d/'+esc(a.archivoId)+'/edit" target="_blank" style="display:block;text-align:center;color:var(--accent);font-size:12px;font-weight:700;text-decoration:none">📄 Ver en Google Sheets</a></div>';

  document.getElementById('mContent').innerHTML=html;
}

// ── RENDER RUTINA EDITABLE ──
var BM={'MOVILIDAD':'bm','ZONA MEDIA':'bz','FUERZA PRINCIPAL':'bf','ACCESORIO':'ba','CARDIO FINAL':'bc','CIRCUITO A':'bci','CIRCUITO B':'bci'};
function bCls(n){var u=n.toUpperCase();var ks=Object.keys(BM);for(var k=0;k<ks.length;k++)if(u.indexOf(ks[k])>=0)return BM[ks[k]];return'bf';}

function renderRutina(rut){
  if(!rut||!rut.length)return'<div style="font-size:12px;color:var(--muted)">Sin días disponibles.</div>';
  return rut.map(function(dia,di){
    var bls=(dia.bloques||[]).map(function(bl,bi){return renderBloque(bl,di,bi);}).join('');
    return'<div class="diacard"><div class="diahdr"><div class="diatit">'+esc(dia.titulo)+'</div></div>'+bls+'</div>';
  }).join('');
}

function renderBloque(bl,di,bi){
  var cls=bCls(bl.nombre);
  var items=(bl.items||[]).map(function(it,ii){return renderItem(it,di,bi,ii);}).join('');
  var addId='af-'+di+'-'+bi;
  return'<div class="blwrap"><div class="blhbar '+cls+'"><span class="blnom">'+esc(bl.nombre)+'</span></div>'
    +'<div class="blbody" id="bi-'+di+'-'+bi+'">'+items
    +'<button class="btnadd" onclick="tgAdd(\''+addId+'\')">+ Agregar ejercicio</button>'
    +'<div class="addform" id="'+addId+'">'
      +'<input class="addinput" type="text" placeholder="Buscar en biblioteca..." id="'+addId+'-n" oninput="buscarEj(this,\''+addId+'-res\')" autocomplete="off">'
      +'<div class="ejresults" id="'+addId+'-res"></div>'
      +'<div class="addgrid">'
        +'<div><span class="addml">Sem 1-2</span><input class="addmi" id="'+addId+'-s12" placeholder="3x12 reps"></div>'
        +'<div><span class="addml">Sem 3</span><input class="addmi" id="'+addId+'-s3" placeholder="3x10 reps"></div>'
        +'<div><span class="addml">Sem 4</span><input class="addmi" id="'+addId+'-s4" placeholder="4x8 reps"></div>'
      +'</div>'
      +'<div class="addbtns">'
        +'<button class="btnconf" onclick="confAdd(\''+addId+'\','+di+','+bi+')">Agregar</button>'
        +'<button class="btncancel" onclick="tgAdd(\''+addId+'\')">Cancelar</button>'
      +'</div>'
    +'</div>'
    +'</div></div>';
}

function renderItem(it,di,bi,ii){
  if(it.tipo==='descanso')return'<div style="background:rgba(46,189,127,.05);border:1px solid rgba(46,189,127,.12);border-radius:var(--rs);padding:8px 10px;font-size:11px;color:var(--muted)">⏱ '+esc(it.texto)+'</div>';
  var id='ej-'+di+'-'+bi+'-'+ii;
  return'<div class="ejcard" id="'+id+'">'
    +'<div class="ejtop"><div class="ejnom">'+esc(it.ejercicio)+'</div><button class="btndel" onclick="delEj(\''+id+'\')">✕</button></div>'
    +'<div class="ejdosis">'
      +'<div class="ditem"><div class="dlbl">Sem 1-2</div><input class="dinput" value="'+esc(it.semana12||'-')+'"></div>'
      +'<div class="ditem"><div class="dlbl">Sem 3</div><input class="dinput" value="'+esc(it.semana3||'-')+'"></div>'
      +'<div class="ditem"><div class="dlbl">Sem 4</div><input class="dinput" value="'+esc(it.semana4||'-')+'"></div>'
    +'</div></div>';
}

function buscarEj(input, resId) {
  var q = input.value.trim();
  var res = document.getElementById(resId);
  if (!res) return;
  if (q.length < 2) { res.innerHTML = ''; return; }
  res.innerHTML = '<div style="font-size:10px;color:var(--muted);padding:4px">Buscando...</div>';
  api('buscarEjercicios', {query:q}, function(r) {
    if (!r.ejercicios || !r.ejercicios.length) {
      res.innerHTML = '<div style="font-size:10px;color:var(--muted);padding:4px">Sin resultados</div>';
      return;
    }
    res.innerHTML = r.ejercicios.map(function(e) {
      return '<div class="ejresult-item"><span>'+esc(e.nombre)+'</span><span class="ejresult-meta">'+esc(e.bloque)+'</span></div>';
    }).join('');
    res.querySelectorAll('.ejresult-item').forEach(function(el, i) {
      var nom = r.ejercicios[i].nombre;
      el.onclick = function() { selEj(resId, nom); };
    });
  }, function() { res.innerHTML = ''; });
}

function selEj(resId, nombre) {
  var addId = resId.replace('-res', '');
  var input = document.getElementById(addId + '-n');
  if (input) input.value = nombre;
  var res = document.getElementById(resId);
  if (res) res.innerHTML = '';
}

function tgAdd(id){var el=document.getElementById(id);if(el)el.classList.toggle('open');}
function delEj(id){var el=document.getElementById(id);if(el)el.remove();}
function confAdd(addId,di,bi){
  var nom=document.getElementById(addId+'-n').value.trim();
  if(!nom){alert('Ingresá el nombre.');return;}
  var s12=document.getElementById(addId+'-s12').value.trim()||'3x12 reps';
  var s3=document.getElementById(addId+'-s3').value.trim()||'3x10 reps';
  var s4=document.getElementById(addId+'-s4').value.trim()||'4x8 reps';
  var cont=document.getElementById('bi-'+di+'-'+bi);
  var ii=cont.querySelectorAll('.ejcard').length;
  var div=document.createElement('div');
  div.innerHTML=renderItem({tipo:'ejercicio',ejercicio:nom,semana12:s12,semana3:s3,semana4:s4},di,bi,ii);
  var addBtn=cont.querySelector('.btnadd');
  cont.insertBefore(div.firstChild,addBtn);
  document.getElementById(addId+'-n').value='';
  document.getElementById(addId+'-s12').value='';
  document.getElementById(addId+'-s3').value='';
  document.getElementById(addId+'-s4').value='';
  document.getElementById(addId).classList.remove('open');
}

// ── GUARDAR CAMBIOS ──
function recopilar(){
  var cont=document.getElementById('rutinaContainer');
  var dias=[];
  cont.querySelectorAll('.diacard').forEach(function(dc){
    var titulo=dc.querySelector('.diatit').textContent.trim();
    var bloques=[];
    dc.querySelectorAll('.blwrap').forEach(function(bw){
      var nom=bw.querySelector('.blnom').textContent.trim();
      var items=[];
      bw.querySelectorAll('.ejcard').forEach(function(ec){
        var n=ec.querySelector('.ejnom').textContent.trim();
        var ins=ec.querySelectorAll('.dinput');
        items.push({tipo:'ejercicio',ejercicio:n,
          semana12:ins[0]?ins[0].value.trim():'-',
          semana3:ins[1]?ins[1].value.trim():'-',
          semana4:ins[2]?ins[2].value.trim():'-'});
      });
      bloques.push({nombre:nom,items:items});
    });
    dias.push({titulo:titulo,bloques:bloques});
  });
  return dias;
}

function guardarCambios(){
  var dias=recopilar();
  var btn=document.querySelector('.btnguardar');
  if(btn){btn.textContent='Guardando...';btn.disabled=true;}
  apiPost('guardarRutina', {archivoId:_archActual, plan:_planActivo, dias:recopilar()}, function(){
    var m=document.getElementById('msgGuardado');if(m){m.style.display='block';setTimeout(function(){m.style.display='none';},3000);}
    if(btn){btn.textContent='💾 Guardar cambios en la rutina';btn.disabled=false;}
  }, function(e){
    alert('Error al guardar: '+e.message);
    if(btn){btn.textContent='💾 Guardar cambios en la rutina';btn.disabled=false;}
  });
}

// ── CAMBIAR PLAN ──
function cambiarPlan(plan,btn){
  if(plan===_planActivo)return;
  document.querySelectorAll('.planbtn').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  document.getElementById('rutinaContainer').innerHTML='<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Cargando...</div>';
  api('cambiarPlan', {archivoId:_archActual, plan:plan}, function(r){
    _planActivo=r.planActivo;_rutina=r.rutina||[];document.getElementById('rutinaContainer').innerHTML=renderRutina(_rutina);
  }, function(e){alert(e.message);});
}

// ── APROBAR DESDE MODAL ──
function aprobarModal(dni,nombre,btn){
  if(!confirm('¿Aprobar la rutina de '+nombre+'?\nEl alumno podrá acceder con su DNI.'))return;
  btn.disabled=true;btn.textContent='Aprobando...';
  api('aprobar', {dni:dni}, function(){
    btn.textContent='✓ Aprobado';btn.style.background='rgba(46,189,127,.3)';
    var a=_alumnos.find(function(x){return ndni(x.dni)===ndni(dni);});
    if(a)a.estado='Plan vigente';
    actualizarStats();renderLista();
  }, function(e){btn.disabled=false;btn.textContent='✓ Aprobar solicitud';alert('Error: '+e.message);});
}

// ── GUARDAR OBS ──
function guardarObs(archId){
  var obs=document.getElementById('obsTa').value;
  api('guardarObs', {archivoId:archId, texto:obs}, function(){
    var m=document.getElementById('obsMsg');m.style.display='block';setTimeout(function(){m.style.display='none';},2500);
  }, function(e){alert('Error: '+e.message);});
}

// ── UTILS ──
function fi(l,v){return'<div><div class="filabel">'+l+'</div><div class="fival">'+esc(String(v||'-'))+'</div></div>';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ndni(v){return String(v||'').replace(/\D/g,'');}
</script>
